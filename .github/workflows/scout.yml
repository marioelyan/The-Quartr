name: RSS Scout

on:
  schedule:
    - cron: '0 22 * * *'   # 22:00 UTC = 05:00 WIB
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install feedparser beautifulsoup4 openai requests

      - name: Run scraper
        run: python script_research.py

      - name: Run curator
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python curator.py

      - name: Run writer
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
        run: python writer.py

      - name: Run newsletter (buat newsletter Substack)
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python newsletter.py

      - name: Buat ZIP dan kirim ke Telegram
        run: |
          # Buat ZIP dari semua file output
          zip -j the-quartr-output.zip news.json top5.json Artikel.txt newsletter_substack.txt
          if [ -f the-quartr-output.zip ]; then
            curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendDocument" \
              -F chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
              -F document="@the-quartr-output.zip" \
              -F caption=$'📦 The Quartr — '"$(date -u +'%Y-%m-%d')"$'\n\nLengkap: 5 artikel (Artikel.txt), 5 berita terpilih (top5.json), hasil scraping (news.json), dan newsletter Substack (newsletter_substack.txt).\n\n📎 Semua file dalam satu arsip.'
          else
            echo "Gagal membuat ZIP, lewati pengiriman."
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: the-quartr-output
          path: |
            news.json
            top5.json
            Artikel.txt
            newsletter_substack.txt
            the-quartr-output.zip
